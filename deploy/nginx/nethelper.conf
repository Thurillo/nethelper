# ─────────────────────────────────────────────────────────────────
# NetHelper – Nginx virtual host
# Posizione: /etc/nginx/sites-available/nethelper.conf
# Abilitare con: ln -s /etc/nginx/sites-available/nethelper.conf \
#                         /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;          # Sostituire con FQDN o IP fisso, es: nethelper.local

    # ── Charset e compressione ─────────────────────────────────
    charset utf-8;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Sicurezza base ─────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── Frontend SPA ───────────────────────────────────────────
    root /opt/nethelper/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (proxy a Uvicorn) ─────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── SSE: scan job log stream (disabilita buffering) ────────
    location ~ ^/api/v1/scan-jobs/[0-9]+/events {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       Connection        '';
        proxy_set_header       Cache-Control     'no-cache';
        proxy_set_header       X-Accel-Buffering 'no';
        chunked_transfer_encoding on;
        proxy_buffering        off;
        proxy_read_timeout     3600s;
    }

    # ── Log ────────────────────────────────────────────────────
    access_log /var/log/nginx/nethelper_access.log;
    error_log  /var/log/nginx/nethelper_error.log;
}
