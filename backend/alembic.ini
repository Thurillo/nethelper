# A generic, single database configuration.

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template used to generate migration filenames
# file_template = %%(rev)s_%%(slug)s

# sys.path path to add when running alembic
# prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `dateutil` to the `install_requires` of your
# setup.cfg
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to "true" to run the environment during the "revision" command,
# regardless of autogenerate
# revision_environment = false

# Set to "true" to allow .pyc and .pyo files without a source .py
# file to be detected as revisions in the versions/ directory
# sourceless = false

# Version location specification; This defaults to alembic/versions.
# When using multiple version directories, initial revisions must be
# specified with --version-path.
# The path separator used here should be the separator specified by
# "version_path_separator" below.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; As mentioned above, this is the character used to
# split version_locations. The default within new alembic.ini files is "os",
# which uses os.pathsep. Note that the ";" character is a common value used
# in the history file.
# version_path_separator = os  # Use os.pathsep.
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space
version_path_separator = os

# the output encoding used when revision files are written from
# "revision" and "merge" subcommands. The default is utf-8.
# output_encoding = utf-8

# DATABASE_URL is read from the environment in env.py.
# This value is used only by alembic CLI commands that don't go through env.py.
sqlalchemy.url = postgresql+asyncpg://nethelper:nethelper@localhost:5432/nethelper


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black"
# entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
